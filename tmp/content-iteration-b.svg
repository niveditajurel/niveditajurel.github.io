  <text x="1170" y="823" fill="#8F5636" font-size="12" font-family="Arial, sans-serif" font-weight="700" letter-spacing="1.8">SUBSTACK</text>
  <rect x="1170" y="833" width="110" height="10" rx="5" fill="#EAD8C5"/>

