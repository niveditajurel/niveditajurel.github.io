            - heading "The product idea starts with a decision problem, not a dashboard problem." [level=2] [ref=e4870]
            - paragraph [ref=e4871]: "Finwise is based on a simple belief: people do not just need financial visibility. They need help turning context into an understandable next step."
          - generic [ref=e4872]:
            - paragraph [ref=e4873]: Why this idea is interesting
            - list [ref=e4874]:
              - listitem [ref=e4875]:
                - generic [ref=e4877]: Many people can see their money, but they still do not know what to do next.
              - listitem [ref=e4878]:
                - generic [ref=e4880]: Traditional wealth guidance is often too high-touch, too expensive, or too delayed for everyday decisions.
              - listitem [ref=e4881]:
                - generic [ref=e4883]: Most finance tools optimize dashboards and tracking, not confidence, tradeoffs, or follow-through.
        - generic [ref=e4884]:
