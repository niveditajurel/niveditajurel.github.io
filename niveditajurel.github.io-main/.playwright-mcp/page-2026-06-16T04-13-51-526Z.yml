            - paragraph [ref=e111]: Context
            - heading "This product sat at the intersection of speed, trust, and founder-stage commercialization." [level=2] [ref=e112]
            - paragraph [ref=e113]: Nomad AI set out to make small-business valuation and exit planning more accessible. The challenge was not only to produce a faster output. It was to create a product that users could trust enough to take seriously in a financial decision context.
          - generic [ref=e114]:
            - paragraph [ref=e115]: Why the market was hard
            - list [ref=e116]:
              - listitem [ref=e117]:
                - generic [ref=e119]: Small-business owners needed faster, more affordable valuations than broker-led processes could typically provide.
              - listitem [ref=e120]:
                - generic [ref=e122]: Trust mattered as much as speed because valuation is a high-stakes, financial decision surface.
              - listitem [ref=e123]:
                - generic [ref=e125]: The product had to prove credibility before monetization could work.
        - generic [ref=e126]:
          - generic [ref=e127]:
            - paragraph [ref=e128]: Product problem
            - list [ref=e129]:
              - listitem [ref=e130]:
                - generic [ref=e132]: Manual broker reports were expensive and slow for owners who wanted an early valuation signal.
              - listitem [ref=e133]:
                - generic [ref=e135]: The product needed a monetization model that felt credible enough for a trust-sensitive category.
              - listitem [ref=e136]:
                - generic [ref=e138]: Launch decisions had to balance user confidence, pricing clarity, and the analytics needed to learn quickly.
          - generic [ref=e139]:
            - paragraph [ref=e140]: Recruiter signal
            - paragraph [ref=e141]: "This case study shows commercial product judgment: how to structure pricing, analytics, and launch sequencing when the product category is trust-sensitive and the team is lean."
