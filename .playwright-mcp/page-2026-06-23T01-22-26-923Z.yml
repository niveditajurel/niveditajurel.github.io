            - 'heading "The core idea is simple: most agent systems collaborate once, then forget." [level=2] [ref=e4520]'
            - paragraph [ref=e4521]: "Learning Council started from a product question: what if an AI team could keep the useful judgment from one project and reuse it in the next one without the user repeating everything again?"
