            - list [ref=e4887]:
              - listitem [ref=e4888]:
                - generic [ref=e4890]: Financial decisions are fragmented across savings, investing, debt, retirement, and short-term tradeoffs.
              - listitem [ref=e4891]:
                - generic [ref=e4893]: Users get generic advice, but not enough context on why a recommendation fits their situation.
              - listitem [ref=e4894]:
                - generic [ref=e4896]: Trust breaks quickly when a product sounds authoritative without showing reasoning or guardrails.
              - listitem [ref=e4897]:
                - generic [ref=e4899]: Even motivated users struggle to convert goals into a clear action plan they can actually maintain.
