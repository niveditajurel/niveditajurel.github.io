  <text x="72" y="103" fill="#6A5546" font-size="16" font-family="Arial, sans-serif" font-weight="700" letter-spacing="5">CONTENT</text>
  <text x="72" y="164" fill="#201712" font-size="72" font-family="Georgia, serif">Writing and</text>
  <text x="72" y="230" fill="#201712" font-size="72" font-family="Georgia, serif">content that</text>
  <text x="72" y="296" fill="#201712" font-size="72" font-family="Georgia, serif">show how I think.</text>
  <text x="840" y="187" fill="#6D5B4C" font-size="21" font-family="Arial, sans-serif">A more media-forward option: feature one strong content lane,</text>
  <text x="840" y="223" fill="#6D5B4C" font-size="21" font-family="Arial, sans-serif">then let LinkedIn, Medium, and Substack support it.</text>

  <g filter="url(#shadow2)">
    <rect x="72" y="356" width="770" height="530" rx="34" fill="#FFF9F3" fill-opacity="0.92"/>
    <rect x="862" y="356" width="506" height="256" rx="34" fill="#FFF9F3" fill-opacity="0.92"/>
    <rect x="862" y="630" width="506" height="256" rx="34" fill="#FFF9F3" fill-opacity="0.92"/>
  </g>
  <rect x="72.5" y="356.5" width="769" height="529" rx="33.5" stroke="#DDCCBC"/>
  <rect x="862.5" y="356.5" width="505" height="255" rx="33.5" stroke="#DDCCBC"/>
  <rect x="862.5" y="630.5" width="505" height="255" rx="33.5" stroke="#DDCCBC"/>

  <text x="98" y="390" fill="#8D684B" font-size="13" font-family="Arial, sans-serif" font-weight="700" letter-spacing="2">FEATURED CONTENT LANE</text>
  <text x="98" y="446" fill="#201712" font-size="48" font-family="Georgia, serif">Instagram reels and</text>
  <text x="98" y="492" fill="#201712" font-size="48" font-family="Georgia, serif">visual notes</text>
  <text x="98" y="530" fill="#6D5B4C" font-size="19" font-family="Arial, sans-serif">Use one dominant reel preview to make the section feel alive, then</text>
  <text x="98" y="560" fill="#6D5B4C" font-size="19" font-family="Arial, sans-serif">support it with smaller writing surfaces instead of giving every</text>
  <text x="98" y="590" fill="#6D5B4C" font-size="19" font-family="Arial, sans-serif">platform equal weight.</text>

  <rect x="98" y="622" width="454" height="214" rx="28" fill="url(#bigReel)" stroke="#DCCBBB"/>
  <rect x="124" y="648" width="124" height="40" rx="20" fill="#FFF8F0" fill-opacity="0.88" stroke="#E5D4C5"/>
  <text x="149" y="673" fill="#7E4E2F" font-size="13" font-family="Arial, sans-serif" font-weight="700" letter-spacing="2">LATEST REEL</text>
  <rect x="122" y="748" width="402" height="66" rx="22" fill="#FFF9F2" fill-opacity="0.84"/>
  <circle cx="325" cy="722" r="28" fill="#FFF9F3"/>
  <path d="M318 708L337 722L318 736V708Z" fill="#A06440"/>

