            - heading "I focused on the product decisions that made the launch testable and commercially coherent." [level=2] [ref=e145]
            - paragraph [ref=e146]: "My contribution was not one feature. It was the operating frame for how the team would learn: who to price for, what to measure, how to sequence the MVP, and how to make valuation data flow more reliably."
