            - heading "The important decisions were about credibility, not just speed." [level=2] [ref=e211]
            - paragraph [ref=e212]: The product had to avoid looking like a shortcut pretending to be a financial tool. That shaped how I approached pricing, measurement, and the difference between projected upside and validated signals.
          - generic [ref=e213]:
            - generic [ref=e214]:
              - heading "Trust before monetization depth" [level=3] [ref=e215]
              - paragraph [ref=e216]: The product could not rely on pricing cleverness alone. The first job was to make the valuation experience feel legible and credible enough that users would engage seriously.
            - generic [ref=e217]:
              - heading "Measure before you scale" [level=3] [ref=e218]
              - paragraph [ref=e219]: I treated analytics as core product infrastructure, not a reporting layer. Without funnels and leading indicators, the team would not know whether pricing, onboarding, or trust was the blocker.
