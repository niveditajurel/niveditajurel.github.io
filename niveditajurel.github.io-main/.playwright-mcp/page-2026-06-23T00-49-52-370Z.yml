            - heading "The product idea starts with a decision problem, not a dashboard problem." [level=2] [ref=e1476]
            - paragraph [ref=e1477]: "Finwise is based on a simple belief: people do not just need financial visibility. They need help turning context into an understandable next step."
          - generic [ref=e1478]:
            - paragraph [ref=e1479]: Why this idea is interesting
            - list [ref=e1480]:
              - listitem [ref=e1481]:
                - generic [ref=e1483]: Many people can see their money, but they still do not know what to do next.
              - listitem [ref=e1484]:
                - generic [ref=e1486]: Traditional wealth guidance is often too high-touch, too expensive, or too delayed for everyday decisions.
              - listitem [ref=e1487]:
                - generic [ref=e1489]: Most finance tools optimize dashboards and tracking, not confidence, tradeoffs, or follow-through.
        - generic [ref=e1490]:
