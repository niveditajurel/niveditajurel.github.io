            - paragraph [ref=e1492]: Product problem
            - list [ref=e1493]:
              - listitem [ref=e1494]:
                - generic [ref=e1496]: Financial decisions are fragmented across savings, investing, debt, retirement, and short-term tradeoffs.
              - listitem [ref=e1497]:
                - generic [ref=e1499]: Users get generic advice, but not enough context on why a recommendation fits their situation.
              - listitem [ref=e1500]:
                - generic [ref=e1502]: Trust breaks quickly when a product sounds authoritative without showing reasoning or guardrails.
              - listitem [ref=e1503]:
                - generic [ref=e1505]: Even motivated users struggle to convert goals into a clear action plan they can actually maintain.
          - generic [ref=e1506]:
            - paragraph [ref=e1507]: Builder signal
