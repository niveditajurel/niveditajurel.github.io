    <text x="126" y="867" fill="#8F5636" font-size="12" font-family="Arial, sans-serif" font-weight="700" letter-spacing="1.8">INSTAGRAM</text>
    <text x="245" y="867" fill="#8F5636" font-size="12" font-family="Arial, sans-serif" font-weight="700" letter-spacing="1.8">IDEAS IN PUBLIC</text>
    <text x="380" y="867" fill="#8F5636" font-size="12" font-family="Arial, sans-serif" font-weight="700" letter-spacing="1.8">OPEN PROFILE</text>
  </g>

  <text x="888" y="390" fill="#8D684B" font-size="13" font-family="Arial, sans-serif" font-weight="700" letter-spacing="2">PROFESSIONAL ESSAYS</text>
  <text x="888" y="436" fill="#201712" font-size="38" font-family="Georgia, serif">LinkedIn posts</text>
  <text x="888" y="468" fill="#6D5B4C" font-size="18" font-family="Arial, sans-serif">Shorter public writing on PM judgment, systems</text>
  <text x="888" y="496" fill="#6D5B4C" font-size="18" font-family="Arial, sans-serif">thinking, and career direction.</text>
  <rect x="888" y="522" width="454" height="70" rx="22" fill="url(#linkedinCard)" stroke="#E3D5C8"/>
  <circle cx="920" cy="557" r="18" fill="#7DA1EB"/>
  <rect x="950" y="546" width="106" height="10" rx="5" fill="#DCE7FF"/>
  <rect x="950" y="564" width="84" height="10" rx="5" fill="#E9F0FF"/>
  <rect x="1124" y="536" width="194" height="42" rx="14" fill="url(#linkedinPanel2)"/>

  <text x="888" y="664" fill="#8D684B" font-size="13" font-family="Arial, sans-serif" font-weight="700" letter-spacing="2">ARCHIVE + ESSAYS</text>
  <text x="888" y="710" fill="#201712" font-size="38" font-family="Georgia, serif">Medium and Substack</text>
  <text x="888" y="742" fill="#6D5B4C" font-size="18" font-family="Arial, sans-serif">Longer reflections, essays, and notes that do not</text>
  <text x="888" y="770" fill="#6D5B4C" font-size="18" font-family="Arial, sans-serif">need to compete with reels visually.</text>
  <rect x="888" y="792" width="454" height="74" rx="22" fill="#FFF7EF" stroke="#E3D5C8"/>
  <rect x="904" y="809" width="40" height="40" rx="12" fill="#F2DCC7"/>
  <text x="914" y="834" fill="#8F5636" font-size="12" font-family="Arial, sans-serif" font-weight="700">ME</text>
  <text x="962" y="823" fill="#8F5636" font-size="12" font-family="Arial, sans-serif" font-weight="700" letter-spacing="1.8">MEDIUM</text>
  <rect x="962" y="833" width="126" height="10" rx="5" fill="#EAD8C5"/>
  <rect x="1112" y="809" width="40" height="40" rx="12" fill="#F4E4D2"/>
