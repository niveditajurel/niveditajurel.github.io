              - heading "Launch sequencing" [level=3] [ref=e921]
              - paragraph [ref=e922]: Created a Jira roadmap and clarified sprint priorities so the team could sequence pricing, analytics, and MVP delivery with less noise.
        - generic [ref=e923]:
