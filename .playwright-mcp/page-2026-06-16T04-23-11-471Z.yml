              - heading "Analytics and ETL foundation" [level=3] [ref=e913]
              - paragraph [ref=e914]: Defined AARRR, Lean Analytics, and OMTM metrics, then supported Mage AI-based ETL automation to strengthen the reliability of valuation inputs.
            - generic [ref=e915]:
