            - list [ref=e4524]:
              - listitem [ref=e4525]:
                - generic [ref=e4527]: Most agent systems collaborate once, produce an output, and then forget the judgment that made the work better.
              - listitem [ref=e4528]:
                - generic [ref=e4530]: "Users keep repeating the same guidance: use the same positioning, avoid this tone, remember the last decision, and do not make that mistake again."
              - listitem [ref=e4531]:
